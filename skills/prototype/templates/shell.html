<!--
  prototype shell: the review chrome every prototype starts from.

  Contract (extend freely, never strip):
  - Screens:  <section data-screen="slug" data-title="Label"> inside .sh-stage.
               The tab bar, arrow keys, and #hash routing build themselves.
  - States:   a screen with meaningful states declares data-states="a,b,c"
               (free strings; first one is the default). Elements that belong
               to one state carry data-when="a" (comma-separated for several).
               Elements without data-when always show.
  - Viewport: "vp (m)" cycles full / 390 / 768. Start a mobile-first
               prototype by adding class="sh-vp-390" to <body> (or a
               bootstrap classList.add before the chrome script runs).
  - Tokens:   the project-tokens block below ships wireframe gray on purpose.
               The skeleton pass stays gray so structure is judged first; the
               fill pass starts by replacing that block with the project's
               real tokens (copy them verbatim when a design system exists).
  - Wireframe helpers: .wf-line (text bar), .wf-pic (image placeholder).
               Pencils, not floor plans: they draw nothing by themselves.

  Self-contained by design: no build, no framework, no network.
  Chrome that needs explaining has failed; keep it three controls.
-->
<title>Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ── project tokens: replace this block in the fill pass ─────────── */
  :root {
    --background: #f6f6f6;
    --surface: #ffffff;
    --foreground: #3a3a3a;
    --muted: #9a9a9a;
    --line: #dcdcdc;
    --accent: #6b6b6b;
    --radius: 6px;
    --font: system-ui, sans-serif;
  }

  /* ── review chrome (sh-*): keep, extend, never strip ─────────────── */
  * { box-sizing: border-box }
  body {
    margin: 0; padding: 0 0 40px;
    background: var(--background); color: var(--foreground);
    font-family: var(--font);
  }
  .sh-bar {
    position: sticky; top: 0; z-index: 999;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    padding: 8px 12px; background: #191a1c; color: #d7d7d7;
    font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .sh-bar b { color: #8a8f98; font-weight: 500 }
  .sh-bar button {
    border: 1px solid #3a3d42; background: none; color: inherit;
    font: inherit; padding: 2px 9px; border-radius: 99px; cursor: pointer;
  }
  .sh-bar button.on { background: #d7d7d7; color: #191a1c; border-color: #d7d7d7 }
  #sh-states:not([hidden])::before { content: "state"; color: #8a8f98; margin-right: 4px }
  .sh-spacer { flex: 1 }
  .sh-stage { max-width: 960px; margin: 0 auto; padding: 12px 16px 0 }
  [hidden] { display: none !important }

  /* viewport presets */
  .sh-vp-390 .sh-stage {
    max-width: 390px; background: var(--background);
    border: 10px solid #191a1c; border-radius: 28px;
    padding: 16px 12px; min-height: 660px; margin-top: 12px;
  }
  .sh-vp-768 .sh-stage {
    max-width: 768px; border: 1px solid #c4c4c4; border-radius: 12px;
    padding: 16px; margin-top: 12px;
  }

  /* wireframe helpers */
  .wf-line { height: 10px; border-radius: 4px; background: #e3e3e3; margin: 7px 0 }
  .wf-pic  { border-radius: 4px; background:
             repeating-linear-gradient(45deg, #e9e9e9, #e9e9e9 6px, #f2f2f2 6px, #f2f2f2 12px) }
</style>

<header class="sh-bar">
  <b>proto</b>
  <nav id="sh-tabs"></nav>
  <span class="sh-spacer"></span>
  <span id="sh-states" hidden></span>
  <button id="sh-vp">vp: full (m)</button>
</header>

<main class="sh-stage">
  <!-- Replace with real screens. One section per screen: -->
  <section data-screen="placeholder" data-title="placeholder">
    <h2>Empty shell</h2>
    <p>Add sections with <code>data-screen</code> to begin the skeleton pass.</p>
  </section>
</main>

<script>
  const stage = document.querySelector('.sh-stage');
  const screens = [...stage.querySelectorAll('[data-screen]')];
  const tabs = document.getElementById('sh-tabs');
  const statebox = document.getElementById('sh-states');
  const vpBtn = document.getElementById('sh-vp');
  let current = null;

  screens.forEach(s => {
    const b = document.createElement('button');
    b.textContent = s.dataset.title || s.dataset.screen;
    b.dataset.for = s.dataset.screen;
    b.onclick = () => show(s.dataset.screen);
    tabs.append(b);
  });

  function show(slug) {
    current = screens.find(s => s.dataset.screen === slug) || screens[0];
    screens.forEach(s => s.hidden = s !== current);
    [...tabs.children].forEach(b => b.classList.toggle('on', b.dataset.for === current.dataset.screen));
    history.replaceState(null, '', '#' + current.dataset.screen);
    buildStates();
  }

  function buildStates() {
    const names = (current.dataset.states || '').split(',').map(x => x.trim()).filter(Boolean);
    statebox.innerHTML = '';
    statebox.hidden = !names.length;
    names.forEach(name => {
      const b = document.createElement('button');
      b.textContent = name;
      b.onclick = () => applyState(name);
      statebox.append(b);
    });
    applyState(names[0] || null);
  }

  function applyState(name) {
    current.querySelectorAll('[data-when]').forEach(el => {
      el.hidden = !name || !el.dataset.when.split(',').map(x => x.trim()).includes(name);
    });
    [...statebox.children].forEach(b => b.classList.toggle('on', b.textContent === name));
  }

  const VPS = ['full', '390', '768'];
  let vp = VPS.find(v => document.body.classList.contains('sh-vp-' + v)) || 'full';
  function applyVp() {
    VPS.forEach(v => document.body.classList.toggle('sh-vp-' + v, v === vp));
    vpBtn.textContent = 'vp: ' + vp + ' (m)';
    vpBtn.classList.toggle('on', vp !== 'full');
  }
  vpBtn.onclick = () => { vp = VPS[(VPS.indexOf(vp) + 1) % VPS.length]; applyVp(); };
  applyVp();

  addEventListener('keydown', e => {
    if (/INPUT|TEXTAREA|SELECT/.test(e.target.tagName)) return;
    const i = screens.indexOf(current);
    if (e.key === 'ArrowRight') show(screens[(i + 1) % screens.length].dataset.screen);
    if (e.key === 'ArrowLeft') show(screens[(i - 1 + screens.length) % screens.length].dataset.screen);
    if (e.key === 'm') vpBtn.click();
  });

  show(location.hash.slice(1));
</script>
