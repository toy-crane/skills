<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    color-scheme: light;
    --background: #f6f7f9;
    --surface: #ffffff;
    --surface-subtle: #eef1f4;
    --border: #d8dde3;
    --text: #18202a;
    --muted: #657180;
    --accent: #2457d6;
    --accent-contrast: #ffffff;
    --radius: 12px;
    --shadow: 0 12px 32px rgba(24, 32, 42, .10);
  }

  * { box-sizing: border-box; }

  html { min-height: 100%; background: var(--background); }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--background);
    color: var(--text);
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button, input, select, textarea { font: inherit; color: inherit; }
  button, [data-variant] { cursor: pointer; }

  .prototype-header {
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--surface) 92%, transparent);
  }

  .prototype-header-inner,
  .variant,
  .prototype-question {
    width: min(100% - 32px, 1120px);
    margin-inline: auto;
  }

  .prototype-header-inner {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: center;
    padding-block: 16px;
  }

  .prototype-title { margin: 0; font-size: 16px; font-weight: 700; }
  .prototype-label { color: var(--muted); font-size: 13px; }

  .prototype-question {
    padding: 24px 0 8px;
    color: var(--muted);
  }

  .prototype-question strong { color: var(--text); }

  main { padding-bottom: 104px; }

  .variant {
    display: none;
    padding-block: 20px 48px;
  }

  .variant.active { display: block; }
  .stack { display: grid; gap: 16px; }
  .cluster { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .split { display: grid; grid-template-columns: minmax(0, 1fr) minmax(260px, .38fr); gap: 20px; }

  .panel {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 20px;
  }

  .muted { color: var(--muted); }
  .placeholder {
    display: grid;
    min-height: 120px;
    place-items: center;
    border: 1px dashed var(--border);
    border-radius: calc(var(--radius) - 4px);
    background: var(--surface-subtle);
    color: var(--muted);
  }

  .button {
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--surface);
    padding: 9px 14px;
  }

  .button.primary {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--accent-contrast);
  }

  .prototype-switcher {
    position: fixed;
    z-index: 10;
    left: 50%;
    bottom: 20px;
    display: flex;
    gap: 6px;
    padding: 7px;
    transform: translateX(-50%);
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .prototype-switcher button {
    border: 0;
    border-radius: 999px;
    background: transparent;
    padding: 8px 12px;
    color: var(--muted);
  }

  .prototype-switcher button.active {
    background: var(--text);
    color: var(--surface);
  }

  @media (max-width: 760px) {
    .split { grid-template-columns: 1fr; }
    .prototype-header-inner { align-items: flex-start; flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>
<header class="prototype-header">
  <div class="prototype-header-inner">
    <h1 class="prototype-title">{{TITLE}}</h1>
    <span class="prototype-label">Disposable prototype</span>
  </div>
</header>

<p class="prototype-question"><strong>Decision:</strong> {{QUESTION}}</p>

<main>
  <!-- VARIANTS -->
</main>

<nav class="prototype-switcher" aria-label="Prototype variants">
  <!-- NAVIGATION -->
</nav>

<!--
Navigation:
<button type="button" data-variant="focused">A — Focused</button>

Variant:
<section id="variant-focused" class="variant stack" data-variant-panel="focused">
  <div class="panel">Variant content</div>
</section>
-->

<script>
  function showVariant(id) {
    var panel = document.querySelector('[data-variant-panel="' + id + '"]');
    if (!panel) return;

    document.querySelectorAll('[data-variant-panel]').forEach(function (item) {
      item.classList.toggle('active', item === panel);
    });

    document.querySelectorAll('[data-variant]').forEach(function (button) {
      button.classList.toggle('active', button.dataset.variant === id);
    });

    window.history.replaceState({}, '', '#' + encodeURIComponent(id));
  }

  document.addEventListener('click', function (event) {
    var trigger = event.target.closest('[data-variant]');
    if (trigger) showVariant(trigger.dataset.variant);
  });

  document.addEventListener('keydown', function (event) {
    if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') return;
    if (event.target.closest('input, textarea, select, [contenteditable]')) return;

    var buttons = Array.from(document.querySelectorAll('[data-variant]'));
    var current = buttons.findIndex(function (button) { return button.classList.contains('active'); });
    var delta = event.key === 'ArrowRight' ? 1 : -1;
    var next = buttons[(current + delta + buttons.length) % buttons.length];
    if (next) showVariant(next.dataset.variant);
  });

  document.addEventListener('DOMContentLoaded', function () {
    var requested = decodeURIComponent(window.location.hash.replace(/^#/, ''));
    var first = document.querySelector('[data-variant-panel]');
    showVariant(requested || (first && first.dataset.variantPanel));
  });
</script>
</body>
</html>
