<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    --background: #fff;
    --fill: #f2f2f2;
    --border: #aaa;
    --text: #222;
  }

  * { box-sizing: border-box; }

  html {
    min-height: 100%;
    background: var(--background);
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--background);
    color: var(--text);
    font: 14px/1.5 system-ui, sans-serif;
  }

  button, input, select, textarea { font: inherit; color: inherit; }

  button, input, select, textarea, .box {
    border: 1px solid var(--border);
    background: var(--background);
    padding: 8px 12px;
  }

  button, [data-goto] { cursor: pointer; }

  .prototype-nav {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--fill);
  }

  .prototype-nav:empty { display: none; }
  .prototype-nav button.active { background: var(--text); color: var(--background); }

  .screen {
    width: min(100%, 960px);
    margin: 0 auto;
    padding: 24px;
  }

  .screen:not(.active) { display: none; }
  .stack { display: grid; gap: 16px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .fill { background: var(--fill); }
  .muted { opacity: .65; }

  .placeholder {
    display: grid;
    min-height: 120px;
    place-items: center;
    border: 1px dashed var(--border);
    background: var(--fill);
  }
</style>
</head>
<body>
<nav class="prototype-nav" aria-label="Prototype screens"><!-- NAVIGATION --></nav>

<main>
  <!-- SCREENS -->
</main>

<!--
Navigation:
<button type="button" data-show="home">Home</button>

Screen:
<section id="screen-home" class="screen stack">
  <h1>Home</h1>
  <div class="box fill">Wireframe content</div>
  <button type="button" data-goto="details">Open details</button>
</section>
-->

<script>
  function showScreen(id) {
    var screen = document.getElementById('screen-' + id);
    if (!screen) return;

    document.querySelectorAll('.screen').forEach(function (item) {
      item.classList.toggle('active', item === screen);
    });

    document.querySelectorAll('[data-show]').forEach(function (button) {
      button.classList.toggle('active', button.dataset.show === id);
    });
  }

  document.addEventListener('click', function (event) {
    var trigger = event.target.closest('[data-show], [data-goto]');
    if (!trigger) return;
    showScreen(trigger.dataset.show || trigger.dataset.goto);
  });

  document.addEventListener('DOMContentLoaded', function () {
    var firstScreen = document.querySelector('.screen');
    if (firstScreen) showScreen(firstScreen.id.replace(/^screen-/, ''));
  });
</script>
</body>
</html>
